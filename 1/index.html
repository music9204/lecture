<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />
    <title>Document</title>
  </head>

  <body>
    <div id="loginForm">
      <h1>Hello, What's your name?</h1>
      <form>
        <input type="text" />
        <p>Please enter your first name or the name you prefer tobe called.</p>
        <button>Continue</button>
      </form>
    </div>
    <h1 id="clock"></h1>
    <h2 id="greeting"></h2>
  </body>
  <script>
    const loginForm = document.querySelector("#loginForm");
    const loginInput = loginForm.querySelector("input");
    const greeting = document.querySelector("#greeting");

    const savedUsername = localStorage.getItem("username");

    if (!savedUsername) {
      loginForm.classList.remove("hidden");
      loginForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const username = loginInput.value;
        greeting.innerText = "Good evening, " + username + ".";
        loginForm.classList.add("hidden");

        localStorage.setItem("username", username);
      });
    } else {
      loginForm.classList.add("hidden");
      greeting.classList.remove("hidden");
      greeting.innerText = `Good evening, ${savedUsername}.`;
    }

    const clock = document.querySelector("h1#clock");

    function getClock() {
      const date = new Date(); // 클래스 초기화

      const hours = makeClock(date.getHours());
      const minutes = makeClock(date.getMinutes());
      const seconds = makeClock(date.getSeconds());
      const clockString = `${hours}:${minutes}:${seconds}`;

      clock.innerText = clockString;
    }

    function makeClock(time) {
      return time.toString().padStart(2, "0");
    }

    getClock();
    setInterval(getClock, 1000);

    navigator.geolocation.getCurrentPosition(onSuccess, onError);

    function onSuccess(p) {
      console.log(p.coords.latitude);
      console.log(p.coords.longitude);
    }

    function onError() {}
  </script>
</html>
